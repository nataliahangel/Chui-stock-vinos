<head>

<title>CHUI — Alertas de Stock</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root { --bg:#0f0e0c; --surface:#1a1815; --card:#211f1b; --border:#2e2b25; --red:#c0392b; --amber:#d4a017; --green:#4a7c59; --blue:#4a6fa5; --text:#e8e0d0; --muted:#7a7060; --dim:#4a4538; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:'DM Mono',monospace; font-weight:300; min-height:100vh; padding:40px 24px; }
  body::before { content:''; position:fixed; inset:0; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events:none; z-index:999; opacity:0.6; }
  header { max-width:900px; margin:0 auto 48px; display:flex; align-items:flex-end; justify-content:space-between; border-bottom:1px solid var(--border); padding-bottom:24px; }
  .logo { font-family:'Playfair Display',serif; font-size:42px; font-style:italic; letter-spacing:-1px; line-height:1; }
  .header-meta { text-align:right; color:var(--muted); font-size:11px; letter-spacing:0.1em; line-height:1.8; }
  .stats-row { max-width:900px; margin:0 auto 40px; display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
  .stat-box { background:var(--surface); border:1px solid var(--border); padding:18px 20px; border-radius:2px; transition: border-color 0.2s, transform 0.1s; }
  .stat-box:hover { border-color: var(--muted); transform: translateY(-1px); }
  .stat-box .num { font-family:'Playfair Display',serif; font-size:36px; line-height:1; margin-bottom:6px; }
  .stat-box .label { font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted); }
  .stat-box.red .num { color:var(--red); } .stat-box.amber .num { color:var(--amber); } .stat-box.green .num { color:var(--green); } .stat-box.blue .num { color:var(--blue); }
  .filters { max-width:900px; margin:0 auto 28px; display:flex; gap:8px; flex-wrap:wrap; }
  .filter-btn { background:var(--surface); border:1px solid var(--border); color:var(--muted); font-family:'DM Mono',monospace; font-size:11px; letter-spacing:0.08em; padding:7px 14px; border-radius:2px; cursor:pointer; text-transform:uppercase; transition:all 0.2s; }
  .filter-btn:hover,.filter-btn.active { background:var(--card); color:var(--text); border-color:var(--muted); }
  .filter-btn.red.active { border-color:var(--red); color:var(--red); }
  .filter-btn.amber.active { border-color:var(--amber); color:var(--amber); }
  .cat-btn { background:var(--surface); border:1px solid var(--border); color:var(--muted); font-family:'DM Mono',monospace; font-size:11px; letter-spacing:0.06em; padding:6px 12px; border-radius:2px; cursor:pointer; transition:all 0.2s; }
  .cat-btn:hover, .cat-btn.active { background:var(--card); color:var(--text); border-color:var(--text); }
  .section { max-width:900px; margin:0 auto 32px; }
  .section-title { font-size:10px; letter-spacing:0.2em; text-transform:uppercase; color:var(--muted); margin-bottom:12px; display:flex; align-items:center; gap:10px; }
  .section-title::after { content:''; flex:1; height:1px; background:var(--border); }
  .alert-card { background:var(--card); border:1px solid var(--border); border-left:3px solid; padding:16px 20px; margin-bottom:8px; border-radius:0 2px 2px 0; display:grid; grid-template-columns:1fr auto; gap:12px; align-items:start; animation:fadeIn 0.4s ease forwards; opacity:0; }
  @keyframes fadeIn { to { opacity:1; } }
  .alert-card.critica { border-left-color:var(--red); } .alert-card.alerta { border-left-color:var(--amber); } .alert-card.ok { border-left-color:var(--green); }
  .wine-name { font-family:'Playfair Display',serif; font-size:17px; margin-bottom:6px; line-height:1.2; }
  .wine-meta { font-size:11px; color:var(--muted); display:flex; gap:16px; flex-wrap:wrap; margin-bottom:8px; }
  .contact-info { font-size:11px; color:var(--muted); margin-top:6px; padding-top:8px; border-top:1px solid var(--border); display:flex; gap:16px; flex-wrap:wrap; }
  .contact-info a { color:var(--amber); text-decoration:none; }
  .historial { margin-top:8px; padding-top:8px; border-top:1px solid var(--border); display:flex; gap:12px; flex-wrap:wrap; font-size:11px; color:var(--muted); }
  .precio-section { overflow:hidden; max-height:0; transition: max-height 0.3s ease, opacity 0.3s ease; opacity:0; }
  .precio-section.open { max-height:80px; opacity:1; }
  .expand-btn { margin-top:8px; background:none; border:1px solid var(--border); color:var(--muted); font-family:'DM Mono',monospace; font-size:10px; letter-spacing:0.08em; padding:4px 10px; border-radius:2px; cursor:pointer; text-transform:uppercase; transition:all 0.2s; display:inline-block; }
  .expand-btn:hover { color:var(--text); border-color:var(--muted); }
  .right-panel { text-align:right; min-width:130px; }
  .badge { display:inline-block; font-size:10px; letter-spacing:0.1em; padding:3px 8px; border-radius:2px; text-transform:uppercase; margin-bottom:10px; }
  .badge.critica { background:rgba(192,57,43,0.2); color:var(--red); border:1px solid rgba(192,57,43,0.4); }
  .badge.alerta { background:rgba(212,160,23,0.15); color:var(--amber); border:1px solid rgba(212,160,23,0.35); }
  .stock-display { font-size:28px; font-family:'Playfair Display',serif; line-height:1; margin-bottom:2px; }
  .stock-label { font-size:10px; color:var(--muted); letter-spacing:0.08em; }
  .pedido-tag { margin-top:10px; font-size:11px; color:var(--dim); background:var(--surface); padding:4px 8px; border-radius:2px; display:inline-block; }
  .pedido-tag strong { color:var(--text); font-weight:500; }
  .obs-tag { display:inline-block; font-size:10px; color:var(--blue); background:rgba(74,111,165,0.1); border:1px solid rgba(74,111,165,0.25); padding:2px 7px; border-radius:2px; margin-top:4px; margin-right:4px; }
  .pendiente-tag { display:inline-block; font-size:10px; color:var(--blue); background:rgba(74,111,165,0.1); border:1px solid rgba(74,111,165,0.4); padding:2px 7px; border-radius:2px; margin-top:4px; margin-right:4px; }
  .wa-fab { position:fixed; bottom:32px; right:32px; background:#25D366; color:#fff; border:none; border-radius:2px; font-family:'DM Mono',monospace; font-size:12px; letter-spacing:0.1em; text-transform:uppercase; padding:14px 22px; cursor:pointer; z-index:100; box-shadow:0 4px 24px rgba(0,0,0,0.4); transition:transform 0.2s,box-shadow 0.2s; display:flex; align-items:center; gap:10px; }
  .wa-fab:hover { transform:translateY(-2px); box-shadow:0 8px 32px rgba(0,0,0,0.5); }
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:200; backdrop-filter:blur(4px); align-items:center; justify-content:center; padding:20px; }
  .modal-overlay.open { display:flex; }
  .modal { background:var(--surface); border:1px solid var(--border); border-radius:2px; width:100%; max-width:640px; max-height:85vh; display:flex; flex-direction:column; overflow:hidden; }
  .modal-header { padding:20px 24px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
  .modal-title { font-family:'Playfair Display',serif; font-size:20px; font-style:italic; }
  .modal-close { background:none; border:1px solid var(--border); color:var(--muted); font-family:'DM Mono',monospace; font-size:11px; padding:5px 12px; cursor:pointer; border-radius:2px; }
  .modal-close:hover { color:var(--text); border-color:var(--muted); }
  .modal-body { overflow-y:auto; padding:20px 24px; display:flex; flex-direction:column; gap:14px; }
  .wa-filter-row { display:flex; gap:8px; }
  .wa-filter-btn { background:var(--surface); border:1px solid var(--border); color:var(--muted); font-family:'DM Mono',monospace; font-size:10px; letter-spacing:0.08em; padding:5px 12px; border-radius:2px; cursor:pointer; text-transform:uppercase; transition:all 0.2s; }
  .wa-filter-btn.active,.wa-filter-btn:hover { background:var(--card); color:var(--text); border-color:var(--muted); }
  .wa-provider-card { background:var(--card); border:1px solid var(--border); border-radius:2px; overflow:hidden; }
  .wa-provider-header { padding:12px 16px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border); gap:10px; }
  .wa-provider-name { font-family:'Playfair Display',serif; font-size:16px; }
  .wa-provider-contact { font-size:11px; color:var(--muted); }
  .wa-provider-actions { display:flex; gap:8px; }
  .wa-btn { font-family:'DM Mono',monospace; font-size:10px; letter-spacing:0.08em; text-transform:uppercase; padding:6px 12px; border-radius:2px; cursor:pointer; border:none; transition:opacity 0.2s; }
  .wa-btn:hover { opacity:0.85; }
  .wa-btn.copy { background:var(--border); color:var(--text); }
  .wa-btn.send { background:#25D366; color:#fff; }
  .wa-btn.copied { background:var(--green); color:#fff; }

  .wa-empty { text-align:center; color:var(--dim); font-size:12px; padding:30px; font-style:italic; }
  footer { max-width:900px; margin:48px auto 0; padding-top:20px; border-top:1px solid var(--border); font-size:10px; color:var(--dim); letter-spacing:0.08em; display:flex; justify-content:space-between; }
</style>

  if (pendientes.length === 0) {
    var empty = document.createElement('div');
    empty.style.cssText = 'max-width:900px;margin:40px auto;text-align:center;color:#4a4538;font-size:13px;font-style:italic';

    if (!porAsesor[key]) porAsesor[key] = { asesor: item.asesor, contacto: item.contacto, razon: item.razon, items: [] };

        : '';

        '</div>' +

function applySearch() {
  currentSearch = document.getElementById('search-input').value.toLowerCase().trim();
  renderItems(currentFilter);
}

function clearSearch() {
  document.getElementById('search-input').value = '';
  currentSearch = '';
  renderItems(currentFilter);
}

function matchesSearch(item) {
  if (!currentSearch) return true;
  return item.nombre.toLowerCase().includes(currentSearch) ||
         (item.asesor && item.asesor.toLowerCase().includes(currentSearch)) ||
         (item.razon && item.razon.toLowerCase().includes(currentSearch));
}

function clasificar(item) {
  if (item.minimo === null) return "sin-minimo";
  if (item.stockUnidades === 0) return "critica";
  if (item.stockUnidades <= item.minimo) return "critica";
  if (item.stockUnidades <= item.minimo * 1.4) return "alerta";
  return "ok";
}

function renderItems(filterStatus) {
  var container = document.getElementById('main-content');
  container.innerHTML = '';
  var categorias = [];
  items.forEach(function(i) { if (categorias.indexOf(i.categoria) === -1) categorias.push(i.categoria); });
  var cC=0,cA=0,cO=0,cS=0;
  items.forEach(function(i) { var s=clasificar(i); if(s==='critica')cC++; else if(s==='alerta')cA++; else if(s==='ok')cO++; else cS++; });
  document.getElementById('cnt-critica').textContent=cC;
  document.getElementById('cnt-alerta').textContent=cA;
  document.getElementById('cnt-ok').textContent=cO;
  document.getElementById('cnt-sin').textContent=cS;

  categorias.forEach(function(cat) {
    var catItems = items.filter(function(i) {
      if (i.categoria !== cat) return false;
      if (currentCat !== 'all' && i.categoria !== currentCat) return false;
      if (!matchesSearch(i)) return false;
      if (filterStatus === 'all') return true;
      return clasificar(i) === filterStatus;
    }).sort(function(a,b) {
      var ord = {critica:0,alerta:1,ok:2,'sin-minimo':3};
      return ord[clasificar(a)] - ord[clasificar(b)];
    });
    if (catItems.length === 0) return;

    var section = document.createElement('div'); section.className='section';
    var title = document.createElement('div'); title.className='section-title'; title.textContent=cat.toUpperCase();
    section.appendChild(title);

    catItems.forEach(function(item, idx) {
      var estado = clasificar(item);
      var card = document.createElement('div');
      card.className = 'alert-card ' + (estado==='sin-minimo' ? 'ok' : estado);
      card.style.animationDelay = (idx*0.05)+'s';

      var col = estado==='critica' ? '#c0392b' : estado==='alerta' ? '#d4a017' : '#4a7c59';
      var badge = estado==='critica' ? '<div class="badge critica">Pedir ya</div>' : estado==='alerta' ? '<div class="badge alerta">En alerta</div>' : '';

      var ct = '';
      if (item.asesor) ct += '<span>👤 '+item.asesor+'</span>';
      if (item.contacto) {
        var isEm = item.contacto.indexOf('@') !== -1;
        ct += '<span>'+(isEm?'✉':'📱')+' <a href="'+(isEm?'mailto:':'https://wa.me/')+item.contacto.replace(/[\s\+\-]/g,'')+'">'+item.contacto+'</a></span>';
      }
      if (item.razon && item.razon!=='?' && item.razon!=='-') ct += '<span>🏢 '+item.razon+'</span>';

      var obsH = item.obs ? '<span class="obs-tag">'+item.obs+'</span>' : '';
      var penH = item.pendiente ? '<span class="pendiente-tag">🚚 '+item.pendiente+'</span>' : '';
      var minL = item.minimo !== null ? 'min: '+item.minimo+'u' : 'sin minimo';
      var pedH = item.pedido !== '-' ? '<div class="pedido-tag">Pedir: <strong>'+item.pedido+'</strong></div>' : '';

      var histH = '';
      if (item.ultimoPedido) {
        var entH = item.entregado ? '<span>✅ <strong style="color:#4a7c59">'+item.entregado+'</strong></span>' : '<span style="color:#d4a017">⏳ Pendiente</span>';
        histH = '<div class="historial"><span>🗓 '+item.ultimoPedido+'</span><span>📋 '+item.ultimoCant+'</span>'+entH+'</div>';
      }

      var descH = '';
      var desc = descripciones[item.nombre];
      if (desc) {
        var descId = 'desc-' + idx + '-' + cat.replace(/\s/g,'');
        descH = '<button class="expand-btn" style="border-color:rgba(139,90,60,0.4);color:#a07050" onclick="toggleDesc(\'' + descId + '\', this)">🍷 Ver ficha</button>'
          + '<div class="precio-section" id="' + descId + '">'
          + '<div style="margin-top:8px;padding:10px 14px;background:rgba(139,90,60,0.06);border:1px solid rgba(139,90,60,0.2);border-radius:2px;font-size:11px;color:#c8b89a;line-height:1.8">'
          + '<div style="margin-bottom:4px"><span style="color:#7a7060;text-transform:uppercase;letter-spacing:0.08em;font-size:10px">📍 Zona &nbsp;</span>' + desc.zona + '</div>'
          + '<div style="margin-bottom:4px"><span style="color:#7a7060;text-transform:uppercase;letter-spacing:0.08em;font-size:10px">🧪 Perfil &nbsp;</span>' + desc.perfil + '</div>'
          + '<div><span style="color:#7a7060;text-transform:uppercase;letter-spacing:0.08em;font-size:10px">👃 Notas &nbsp;</span>' + desc.notas + '</div>'
          + '</div></div>';
      }

      var recoH = '';
      var reco = recomendaciones[item.nombre];
      if (reco) {
        var recoId = 'reco-' + idx + '-' + cat.replace(/\s/g,'');
        recoH = '<button class="expand-btn" style="border-color:rgba(212,160,23,0.4);color:#d4a017" onclick="toggleReco(\'' + recoId + '\', this)">💡 Ver recomendación</button>'
          + '<div class="precio-section" id="' + recoId + '">'
          + '<div style="margin-top:8px;padding:8px 12px;background:rgba(212,160,23,0.08);border:1px solid rgba(212,160,23,0.2);border-radius:2px;font-size:11px;color:#e8e0d0;line-height:1.6">' + reco + '</div>'
          + '</div>';
      }

      var precioH = '';
      var p = precios[item.nombre];
      if (p) {
        var margen = Math.round((p.venta - p.costo) / p.venta * 100);
        var mColor = margen >= 65 ? '#4a7c59' : margen >= 60 ? '#d4a017' : '#c0392b';
        var uid = 'precio-' + idx + '-' + cat.replace(/\s/g,'');
        precioH = '<button class="expand-btn" onclick="togglePrecio(\'' + uid + '\', this)">💲 Ver precios</button>'
          + '<div class="precio-section" id="' + uid + '">'
          + '<div style="margin-top:8px;padding-top:8px;border-top:1px solid #2e2b25;display:flex;gap:14px;flex-wrap:wrap;font-size:11px;color:#7a7060">'
          + '<span>💰 Costo: <strong style="color:#e8e0d0">' + formatPesos(p.costo) + '</strong></span>'
          + '<span>🏷️ Venta: <strong style="color:#e8e0d0">' + formatPesos(p.venta) + '</strong></span>'
          + '<span>📈 Margen: <strong style="color:' + mColor + '">' + margen + '%</strong></span>'
          + '</div></div>';
      }

      card.innerHTML =
        '<div>'+
          '<div class="wine-name">'+item.nombre+'</div>'+
          '<div class="wine-meta"><span>📦 '+minL+'</span><span>🗂 '+item.categoria+'</span></div>'+
          obsH+penH+
          '<div class="contact-info">'+ct+'</div>'+
          histH+
          descH+
          recoH+
          precioH+
        '</div>'+
        '<div class="right-panel">'+
          badge+
          '<div class="stock-display" style="color:'+col+'">'+item.stockUnidades+'</div>'+
          '<div class="stock-label">'+(item.stockUnidades===0?'SIN STOCK':'unidades')+'</div>'+
          pedH+
        '</div>';

      section.appendChild(card);
    });
    container.appendChild(section);
  });
}

var waFilter = 'urgente';

function buildWAMessage(asesor, productos) {
  var fecha = new Date().toLocaleDateString('es-AR',{day:'numeric',month:'long',year:'numeric'});
  var msg = 'Hola '+(asesor||'')+'! 👋\n\nTe escribimos desde *CHUI* para hacer un pedido ('+fecha+'):\n\n';
  productos.forEach(function(p) {
    msg += '• *'+p.nombre+'*'+(clasificar(p)==='critica'?' ⚠️':'')+' — '+p.pedido+'\n';
    if (p.obs) msg += '  _('+p.obs+')_\n';
  });
  msg += '\nMuchas gracias!';
  return msg;
}

function openWAModal() { waFilter='urgente'; renderWAModal(); document.getElementById('waModal').classList.add('open'); }
function closeWAModal() { document.getElementById('waModal').classList.remove('open'); }
function closeOnOverlay(e) { if(e.target===document.getElementById('waModal'))closeWAModal(); }

function setWAFilter(f,btn) {
  waFilter=f;
  document.querySelectorAll('.wa-filter-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  renderWAModal();
}

function renderWAModal() {
  var body = document.getElementById('waModalBody');
  body.innerHTML='';
  var fr = document.createElement('div'); fr.className='wa-filter-row';
  fr.innerHTML='<button class="wa-filter-btn '+(waFilter==='urgente'?'active':'')+'" onclick="setWAFilter(\'urgente\',this)">Solo urgentes</button><button class="wa-filter-btn '+(waFilter==='all'?'active':'')+'" onclick="setWAFilter(\'all\',this)">Todos</button>';
  body.appendChild(fr);

  var porAsesor={};
  items.forEach(function(item) {
    if(item.pedido==='-') return;
    var estado=clasificar(item);
    if(waFilter==='urgente' && estado!=='critica' && estado!=='alerta') return;
    var key=item.asesor||item.contacto||'Sin contacto';
    if(!porAsesor[key]) porAsesor[key]={asesor:item.asesor,contacto:item.contacto,productos:[]};
    porAsesor[key].productos.push(item);
  });

  var asesores=Object.keys(porAsesor);
  if(asesores.length===0){
    var em=document.createElement('div'); em.className='wa-empty';
    em.textContent=waFilter==='urgente'?'No hay pedidos urgentes.':'No hay pedidos.';
    body.appendChild(em); return;
  }

  asesores.sort(function(a,b){
    return porAsesor[b].productos.filter(function(p){return clasificar(p)==='critica';}).length -
           porAsesor[a].productos.filter(function(p){return clasificar(p)==='critica';}).length;
  });

  asesores.forEach(function(key) {
    var d=porAsesor[key];
    var mensaje=buildWAMessage(d.asesor,d.productos);
    var isEm=d.contacto&&d.contacto.indexOf('@')!==-1;
    var ph=d.contacto?d.contacto.replace(/[\s\+\-]/g,''):null;
    var waL=!isEm&&ph?'https://wa.me/'+ph+'?text='+encodeURIComponent(mensaje):null;
    var cC=d.productos.filter(function(p){return clasificar(p)==='critica';}).length;
    var cA=d.productos.filter(function(p){return clasificar(p)==='alerta';}).length;
    var ub=cC>0?'<span style="color:#c0392b;font-size:10px">⚠ '+cC+' critico'+(cC>1?'s':'')+'</span>':cA>0?'<span style="color:#d4a017;font-size:10px">↓ '+cA+' en alerta</span>':'';
    var card=document.createElement('div'); card.className='wa-provider-card';
    var btnWA=waL?'<button class="wa-btn send" onclick="window.open(\''+waL+'\',\'_blank\')">Abrir WA</button>':'<button class="wa-btn send" onclick="window.open(\'mailto:'+d.contacto+'\',\'_blank\')">Email</button>';
    var msgE=mensaje.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    var msgJ=JSON.stringify(mensaje);
    card.innerHTML='<div class="wa-provider-header" style="background:#211f1b;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #2e2b25;gap:10px"><div><div style="font-family:Playfair Display,serif;font-size:16px;color:#e8e0d0">'+(d.asesor||key)+'</div><div style="font-size:11px;color:#7a7060;margin-top:2px">'+(d.contacto||'')+' '+ub+'</div></div><div style="display:flex;gap:8px"><button style="font-family:DM Mono,monospace;font-size:10px;letter-spacing:0.08em;text-transform:uppercase;padding:6px 12px;border-radius:2px;cursor:pointer;border:none;background:#2e2b25;color:#e8e0d0" onclick="copyMsg(this,'+msgJ+')">Copiar</button>'+btnWA+'</div></div><div style="padding:12px 16px;font-size:12px;line-height:1.8;color:#7a7060;white-space:pre-wrap;font-family:DM Mono,monospace;background:rgba(0,0,0,0.3)">'+msgE+'</div>';
    body.appendChild(card);
  });
}

function copyMsg(btn,msg) {
  navigator.clipboard.writeText(msg).then(function(){
    btn.textContent='✓ Copiado'; btn.classList.add('copied');
    setTimeout(function(){btn.textContent='Copiar';btn.classList.remove('copied');},2000);
  });
}

document.getElementById('fecha').textContent=new Date().toLocaleDateString('es-AR',{weekday:'long',year:'numeric',month:'long',day:'numeric'}).toUpperCase();
renderItems('all');
</script>
